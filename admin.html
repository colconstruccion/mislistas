<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lysty Admin</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#101a2f;
      --text:#e8eefc;
      --muted:#a9b6d3;
      --line:rgba(255,255,255,.10);
      --btn:#3b82f6;
      --btn2:#1f2a44;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(59,130,246,.35), transparent 60%),
                  radial-gradient(1000px 700px at 100% 0%, rgba(16,185,129,.25), transparent 60%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:1100px;margin:0 auto;padding:22px 16px 48px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;border:1px solid var(--line);
      background: rgba(16,26,47,.75);
      border-radius:16px;backdrop-filter: blur(8px);
    }
    .brand{display:flex;flex-direction:column;gap:2px}
    .brand h1{margin:0;font-size:18px;letter-spacing:.2px}
    .brand small{color:var(--muted);font-size:12px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border:none;border-radius:12px;padding:10px 12px;color:var(--text);
      cursor:pointer;font-weight:600;font-size:14px;background: var(--btn2);
      border:1px solid var(--line);
    }
    .btn.primary{background: var(--btn);border-color: rgba(59,130,246,.65)}
    .btn:active{transform: translateY(1px)}
    .grid{
      margin-top:16px;display:grid;gap:14px;
      grid-template-columns: repeat(4, minmax(0,1fr));
    }
    @media (max-width: 980px){ .grid{grid-template-columns: repeat(2, 1fr);} }
    @media (max-width: 520px){ .grid{grid-template-columns: 1fr;} }

    .card{
      border:1px solid var(--line);
      background: rgba(16,26,47,.70);
      border-radius:16px;padding:16px;backdrop-filter: blur(8px);
    }
    .label{color:var(--muted);font-size:13px;margin-bottom:10px}
    .value{font-size:34px;font-weight:800;letter-spacing:.3px;margin:0}
    .sub{color:var(--muted);font-size:12px;margin-top:10px;line-height:1.35}
    .status{
      margin-top:14px;color:var(--muted);font-size:13px;
      padding:10px 12px;border:1px dashed var(--line);
      border-radius:12px;background: rgba(0,0,0,.10);
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>Admin Dashboard</h1>
        <small id="adminEmail">Checking login…</small>
      </div>
      <div class="btns">
        <button class="btn primary" id="refreshBtn">Refresh</button>
        <button class="btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Users</div>
        <p class="value" id="usersCount">—</p>
        <div class="sub">Total profiles in <code>users</code>.</div>
      </div>

      <div class="card">
        <div class="label">Public Documents</div>
        <p class="value" id="publicDocsCount">—</p>
        <div class="sub">Total docs in <code>publicDocuments</code>.</div>
      </div>

      <div class="card">
        <div class="label">Lists</div>
        <p class="value" id="listsCount">—</p>
        <div class="sub">Total in all users’ <code>lists</code> subcollections.</div>
      </div>

      <div class="card">
        <div class="label">User Documents</div>
        <p class="value" id="userDocsCount">—</p>
        <div class="sub">Total in all users’ <code>documents</code> subcollections.</div>
      </div>
    </div>

    <div class="status" id="statusBox">Loading…</div>
  </div>

  <!-- Your existing config must set window._firebase = { app, auth, db } -->
  <script type="module" src="./admin.js"></script>
</body>
</html>
