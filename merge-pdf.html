<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Merge PDFs</title>

  <link rel="stylesheet" href="listasStyle.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="merge-pdf.css?v=2">
</head>
<body class="theme-orange">

  <div class="page-container">

    <div class="back-link-container">
      <a href="auth.html" class="back-link">← Back to Workspace</a>
    </div>

    <div class="pdf-box">
      <h2>Merge PDF Files</h2>

      <p>Select multiple PDF files and combine them into one document.</p>

      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-inner">
          <p class="drop-zone-title">Drag and drop PDF files here</p>
          <p class="drop-zone-subtext">or</p>

          <label for="pdfFilesInput" class="choose-files-btn">
            Select PDF Files
          </label>

          <input
            id="pdfFilesInput"
            type="file"
            accept="application/pdf"
            multiple
            hidden
          >
        </div>
      </div>

      <div id="selectedFilesWrapper" class="selected-files-wrapper">
        <h3 class="selected-files-title">Selected Files</h3>
        <div id="selectedFilesList" class="selected-files-list"></div>
      </div>

      <div class="pdf-actions">
        <button id="mergePdfBtn" class="pdf-btn merge-btn" type="button">
          Merge PDFs
        </button>

        <a
          id="downloadMergedPdf"
          class="pdf-btn download-btn"
          download="merged.pdf"
        >
          Download merged PDF
        </a>

        <button
          id="saveMergedPdfBtn"
          class="pdf-btn save-btn"
          type="button"
          style="display:none;"
        >
          Save to My Documents
        </button>

        <a
          id="goToDocumentsBtn"
          class="pdf-btn workspace-btn"
          href="auth.html"
          style="display:none;"
        >
          Go to My Documents
        </a>
      </div>

      <p id="mergeStatus" class="status"></p>
    </div>
  </div>

  <script type="module" src="firebaseConfig.js?v=5"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script type="module" src="merge-pdf.js?v=5"></script>
</body>
</html>
