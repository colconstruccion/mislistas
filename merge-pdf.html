<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Merge PDFs</title>

  <link rel="stylesheet" href="listasStyle.css">
  <link rel="stylesheet" href="auth.css">

  <style>
    .page-container{
      max-width:700px;
      margin:auto;
      padding:20px;
      box-sizing:border-box;
    }

    .back-link-container{
      margin-bottom:15px;
    }

    .back-link{
      text-decoration:none;
      font-size:14px;
      color:#0b57d0;
      font-weight:500;
    }

    .back-link:hover{
      text-decoration:underline;
    }

    .pdf-box{
      border:1px solid #ddd;
      border-radius:12px;
      padding:20px;
      background:#fff;
      box-sizing:border-box;
    }

    .pdf-box h2{
      margin-top:0;
      margin-bottom:10px;
    }

    .drop-zone{
      border:3px dashed #4a90e2;
      border-radius:18px;
      padding:34px 20px;
      margin-top:16px;
      background:#eaf4ff;
      min-height:260px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      box-sizing:border-box;
    }

    .drop-zone-inner{
      width:100%;
      max-width:500px;
      text-align:center;
      padding:30px 20px;
      border-radius:14px;
      background:#ffffff;
      border:2px solid rgba(74,144,226,0.18);
      box-shadow:0 4px 14px rgba(0,0,0,0.06);
      box-sizing:border-box;
    }

    .drop-zone.dragover{
      border-color:#0b57d0;
      background:#dcecff;
      transform:scale(1.01);
    }

    .drop-zone.dragover .drop-zone-inner{
      border-color:#0b57d0;
      background:#f7fbff;
    }

    .drop-zone-title{
      margin:0;
      font-size:22px;
      font-weight:700;
      color:#123;
      line-height:1.3;
    }

    .drop-zone-subtext{
      margin:12px 0 18px 0;
      font-size:15px;
      color:#5f6b7a;
    }

    .choose-files-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:190px;
      min-height:48px;
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#0b57d0;
      color:#fff;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      text-decoration:none;
      box-shadow:0 2px 8px rgba(11,87,208,0.25);
      transition:opacity 0.2s ease, transform 0.2s ease;
      box-sizing:border-box;
    }

    .choose-files-btn:hover{
      opacity:0.96;
      transform:translateY(-1px);
    }

    .selected-files-wrapper{
      margin-top:18px;
    }

    .selected-files-title{
      margin:0 0 10px 0;
      font-size:16px;
    }

    .selected-files-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .file-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border:1px solid #e2e2e2;
      border-radius:12px;
      background:#fafafa;
      box-sizing:border-box;
    }

    .file-info{
      display:flex;
      flex-direction:column;
      min-width:0;
      flex:1;
    }

    .file-name{
      font-size:14px;
      font-weight:500;
      color:#222;
      word-break:break-word;
    }

    .file-size{
      font-size:12px;
      color:#666;
      margin-top:4px;
    }

    .file-row{
    cursor: grab;
    }

    .file-row.dragging{
      opacity: 0.55;
      transform: scale(0.99);
    }

    .file-left{
      display:flex;
      align-items:flex-start;
      gap:12px;
      flex:1;
      min-width:0;
    }

    .file-icon{
      flex-shrink:0;
      width:38px;
      height:38px;
      border-radius:10px;
      background:#eaf1ff;
      color:#0b57d0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:700;
    }

    .file-meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .file-badge{
      font-size:12px;
      color:#4f5b6b;
      background:#eef2f7;
      border-radius:999px;
      padding:3px 8px;
    }

    .file-row.drop-target-top{
      border-top:3px solid #0b57d0;
    }

    .file-row.drop-target-bottom{
      border-bottom:3px solid #0b57d0;
    }

    .remove-file-btn{
      border:none;
      background:#f3f3f3;
      color:#444;
      width:32px;
      height:32px;
      border-radius:50%;
      cursor:pointer;
      font-size:18px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    .remove-file-btn:hover{
      background:#f8d7da;
      color:#900;
    }

    .empty-files-msg{
      font-size:14px;
      color:#666;
      padding:10px 0;
    }

    .pdf-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:15px;
    }

    .pdf-btn{
      padding:10px 16px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
      box-sizing:border-box;
    }

    .merge-btn{
      background:#0b57d0;
      color:white;
    }

    .download-btn{
      background:#198754;
      color:white;
      text-decoration:none;
      display:none;
    }

    .status{
      margin-top:10px;
      font-size:14px;
    }

    @media(max-width:600px){
      .page-container{
        padding:14px;
      }

      .drop-zone{
        min-height:220px;
        padding:22px 14px;
      }

      .drop-zone-inner{
        padding:22px 14px;
      }

      .drop-zone-title{
        font-size:19px;
      }

      .choose-files-btn{
        width:100%;
        min-width:0;
      }

      .pdf-actions{
        flex-direction:column;
      }

      .pdf-btn{
        width:100%;
      }

      .file-row{
        align-items:flex-start;
      }

      .remove-file-btn{
        margin-top:2px;
      }
    }
  </style>
</head>
<body class="theme-orange">

  <div class="page-container">

    <div class="back-link-container">
      <a href="auth.html" class="back-link">← Back to Workspace</a>
    </div>

    <div class="pdf-box">
      <h2>Merge PDF Files</h2>

      <p>Select multiple PDF files and combine them into one document.</p>

      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-inner">
          <p class="drop-zone-title">Drag and drop PDF files here</p>
          <p class="drop-zone-subtext">or</p>

          <label for="pdfFilesInput" class="choose-files-btn">
            Select PDF Files
          </label>

          <input
            id="pdfFilesInput"
            type="file"
            accept="application/pdf"
            multiple
            hidden
          >
        </div>
      </div>

      <div id="selectedFilesWrapper" class="selected-files-wrapper">
        <h3 class="selected-files-title">Selected Files</h3>
        <div id="selectedFilesList" class="selected-files-list"></div>
      </div>

      <div class="pdf-actions">
        <button id="mergePdfBtn" class="pdf-btn merge-btn" type="button">
          Merge PDFs
        </button>

        <a
          id="downloadMergedPdf"
          class="pdf-btn download-btn"
          download="merged.pdf"
        >
          Download merged PDF
        </a>
      </div>

      <p id="mergeStatus" class="status"></p>
    </div>
  </div>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="merge-pdf.js?v=3"></script>
</body>
</html>
